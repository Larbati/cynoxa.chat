function pi(text,ki){
  ki=ki||0;var out=[],rem=text||'',k=ki*300;
  while(rem){
    var b=rem.match(/\*\*(.+?)\*\*/),c=rem.match(/`([^`\n]+)`/);
    var hits=[b&&{t:'b',m:b},c&&{t:'c',m:c}].filter(Boolean).sort((a,x)=>a.m.index-x.m.index);
    if(!hits.length){out.push(<span key={k++}>{rem}</span>);break;}
    var h=hits[0],t=h.t,m=h.m;
    if(m.index>0)out.push(<span key={k++}>{rem.slice(0,m.index)}</span>);
    if(t==='b')out.push(<strong key={k++} style={{fontWeight:700,color:'#0a1f0a'}}>{m[1]}</strong>);
    if(t==='c')out.push(<code key={k++} style={{background:'rgba(0,140,50,.12)',padding:'1px 6px',borderRadius:4,fontFamily:'monospace',fontSize:'.85em',color:'#005520'}}>{m[1]}</code>);
    rem=rem.slice(m.index+m[0].length);
  }
  return out;
}

function MD({text}){
  var lines=(text||'').split('\n'),out=[],i=0,k=0;
  while(i<lines.length){
    var l=lines[i];
    if(l.startsWith('```')){
      var lang=l.slice(3).trim(),code=[];i++;
      while(i<lines.length&&!lines[i].startsWith('```')){code.push(lines[i]);i++;}
      out.push(<div key={k++} style={{background:'rgba(0,0,0,.05)',border:'1px solid rgba(0,0,0,.09)',borderRadius:8,margin:'10px 0',overflow:'hidden'}}>
        {lang&&<div style={{padding:'3px 14px',fontSize:10,color:'#999',letterSpacing:1,background:'rgba(0,0,0,.04)',borderBottom:'1px solid rgba(0,0,0,.07)',textTransform:'uppercase',fontFamily:'monospace'}}>{lang}</div>}
        <pre style={{margin:0,padding:'12px 14px',overflowX:'auto'}}><code style={{fontFamily:'monospace',fontSize:13,color:'#1a2e1a',whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{code.join('\n')}</code></pre>
      </div>);i++;continue;
    }
    var hm=l.match(/^(#{1,3}) (.+)/);
    if(hm){var lv=hm[1].length,sz=[20,17,15][lv-1],col=lv===3?G:'#0d1f0d';
      out.push(<div key={k++} style={{fontSize:sz,fontWeight:700,color:col,margin:'12px 0 5px'}}>{pi(hm[2],k)}</div>);i++;continue;}
    if(/^[-*] /.test(l)){
      out.push(<div key={k++} style={{display:'flex',gap:8,margin:'4px 0',alignItems:'flex-start'}}>
        <span style={{color:G,flexShrink:0,marginTop:4,fontSize:9}}>&#9670;</span>
        <span style={{lineHeight:1.75}}>{pi(l.slice(2),k)}</span>
      </div>);i++;continue;
    }
    var nm=l.match(/^(\d+)\. (.+)/);
    if(nm){
      out.push(<div key={k++} style={{display:'flex',gap:8,margin:'4px 0',alignItems:'flex-start'}}>
        <span style={{color:G,flexShrink:0,fontWeight:700,minWidth:20,fontSize:13}}>{nm[1]}.</span>
        <span style={{lineHeight:1.75}}>{pi(nm[2],k)}</span>
      </div>);i++;continue;
    }
    if(l.startsWith('---')){out.push(<hr key={k++} style={{border:'none',borderTop:'1px solid rgba(0,0,0,.1)',margin:'12px 0'}}/>);i++;continue;}
    if(!l.trim()){out.push(<div key={k++} style={{height:7}}/>);i++;continue;}
    out.push(<p key={k++} style={{margin:'4px 0',lineHeight:1.75}}>{pi(l,k)}</p>);i++;
  }
  return <div style={{color:'#1a2e1a',fontSize:14.5}}>{out}</div>;
}

async function callStream(msgs,mdl,sys,onC,onD,onE){
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:mdl,max_tokens:2048,stream:true,system:sys,messages:msgs}),
    });
    if(!r.ok){var e=await r.json().catch(()=>({}));onE((e.error&&e.error.message)||'Err '+r.status);return;}
    var rd=r.body.getReader(),dc=new TextDecoder(),buf='';
    for(;;){
      var res=await rd.read();if(res.done)break;
      buf+=dc.decode(res.value,{stream:true});
      var ln=buf.split('\n');buf=ln.pop();
      for(var li=0;li<ln.length;li++){
        var line=ln[li];if(!line.startsWith('data: '))continue;
        var raw=line.slice(6).trim();if(raw==='[DONE]'){onD();return;}
        try{var p=JSON.parse(raw);
          if(p.type==='content_block_delta'&&p.delta&&p.delta.type==='text_delta')onC(p.delta.text);
          if(p.type==='message_stop'){onD();return;}
        }catch(ex){}
      }
    }
    onD();
  }catch(ex){onE(ex.message);}
}

  var send=async(txt)=>{
    if(txt===undefined)txt=input;
    var msg=txt.trim();if(!msg||busy)return;
    var uM={role:'user',content:msg,ts:Date.now()};

    }else{
      base=convs.map(c=>c.id===tid?{...c,title:c.messages.length===0?cut(msg):c.title,messages:[...c.messages,uM,aM]}:c);
      setConvs(base);
    }
    setInput('');if(taRef.current)taRef.current.style.height='auto';
    setBusy(true);bufRef.current='';
    var conv=base.find(c=>c.id===tid);
    var api=conv.messages.slice(0,-1).map(m=>({role:m.role,content:m.content}));
    var upd=buf=>setConvs(p=>p.map(c=>c.id===tid?{...c,messages:c.messages.map((m,i)=>i===c.messages.length-1?{...m,content:buf}:m)}:c));
    await callStream(api,model,CFG.systeme,
      chunk=>{bufRef.current+=chunk;upd(bufRef.current);},
      ()=>{setBusy(false);setConvs(p=>{var u=p.map(c=>c.id===tid?{...c,messages:c.messages.map((m,i)=>i===c.messages.length-1?{...m,streaming:false}:m)}:c);save(u);return u;});},
      err=>{setBusy(false);setConvs(p=>{var u=p.map(c=>c.id===tid?{...c,messages:c.messages.map((m,i)=>i===c.messages.length-1?{...m,content:'Erreur: '+err,streaming:false}:m)}:c);save(u);return u;});}
    );
  };

  var copy=(txt,id)=>{navigator.clipboard.writeText(txt).then(()=>{setCopied(id);setTimeout(()=>setCopied(null),1500);});};
  var onKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};

  var glass='rgba(255,255,255,0.82)',border='rgba(0,0,0,0.08)',TXT='#0d1f0d',MUTED='#6a7a6a';

  return(
    <div style={{display:'flex',height:'100dvh',backgroundImage:'url('+CFG.fond+')',backgroundSize:'cover',backgroundPosition:'center',overflow:'hidden',fontSize:14,color:TXT}}>
      {mob&&sb&&<div onClick={()=>setSb(false)} style={{position:'fixed',inset:0,background:'rgba(240,248,240,.55)',zIndex:49,backdropFilter:'blur(4px)'}}/>}

      {/* ══ SIDEBAR ══ */}
      <div style={{width:268,flexShrink:0,background:glass,backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderRight:'1px solid '+border,display:'flex',flexDirection:'column',boxShadow:'2px 0 24px rgba(0,80,30,.07)',
        ...(mob?{position:'fixed',top:0,left:0,height:'100%',zIndex:50,transition:'transform .26s',transform:sb?'translateX(0)':'translateX(-280px)'}:{})}}>

        <div style={{padding:'14px 14px 12px',borderBottom:'1px solid '+border,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <img src={CFG.logo} alt="logo" style={{width:42,height:42,objectFit:'contain',borderRadius:6,flexShrink:0}} onError={e=>e.target.style.display='none'}/>
            <div>
              <img src={CFG.nom} alt="CYNOXA" style={{height:22,objectFit:'contain',display:'block',maxWidth:110}} onError={e=>e.target.style.display='none'}/>
              <div style={{fontSize:9.5,color:MUTED,letterSpacing:.5,marginTop:2,fontWeight:500,textTransform:'uppercase'}}>{CFG.sousTitre}</div>
            </div>
          </div>
          {mob&&<button onClick={()=>setSb(false)} style={{background:'none',border:'none',color:MUTED,cursor:'pointer',fontSize:22,lineHeight:1,marginLeft:4,flexShrink:0}}>x</button>}
        </div>

        <div style={{padding:'12px 10px 8px'}}>
          <button onClick={newChat}
            style={{width:'100%',padding:'11px 0',background:'transparent',border:'1.5px solid '+G,borderRadius:10,color:G,fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,transition:'all .22s'}}
            onMouseEnter={e=>{e.currentTarget.style.background=G;e.currentTarget.style.color='#fff';}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color=G;}}>
            + Nouvelle conversation
          </button>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'4px 8px'}}>
          {convs.length===0
            ?<div style={{textAlign:'center',color:'rgba(0,0,0,.2)',fontSize:12,padding:'28px 12px',lineHeight:1.9}}>Aucune conversation.<br/>Lance ta premiere question !</div>
            :convs.map(c=>(
              <div key={c.id} onClick={()=>{setAid(c.id);if(mob)setSb(false);}}
                style={{padding:'9px 10px',borderRadius:8,cursor:'pointer',marginBottom:2,background:c.id===aid?'rgba(0,160,60,.1)':'transparent',borderLeft:c.id===aid?'2.5px solid '+G:'2.5px solid transparent',display:'flex',alignItems:'center',gap:6,transition:'all .15s'}}
                onMouseEnter={e=>{if(c.id!==aid)e.currentTarget.style.background='rgba(0,0,0,.04)';}}
                onMouseLeave={e=>{if(c.id!==aid)e.currentTarget.style.background='transparent';}}>
                <div style={{flex:1,overflow:'hidden'}}>
                  <div style={{fontSize:12.5,color:c.id===aid?TXT:MUTED,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',fontWeight:c.id===aid?600:400}}>{c.title}</div>
                  <div style={{fontSize:10,color:'rgba(0,0,0,.2)',marginTop:1}}>{c.messages.length} msg</div>
                </div>
                <button onClick={e=>delChat(c.id,e)} style={{background:'none',border:'none',color:'rgba(0,0,0,.18)',cursor:'pointer',fontSize:17,padding:'2px 5px',borderRadius:4,transition:'color .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.color=R}
                  onMouseLeave={e=>e.currentTarget.style.color='rgba(0,0,0,.18)'}>x</button>
              </div>
            ))
          }
        </div>

        <div style={{borderTop:'1px solid '+border,padding:'12px 10px 14px'}}>
          <div style={{fontSize:10,color:'rgba(0,0,0,.28)',letterSpacing:1.2,textTransform:'uppercase',marginBottom:5}}>MODELE IA</div>
          <select value={model} onChange={e=>setModel(e.target.value)}
            style={{width:'100%',background:'rgba(255,255,255,.7)',border:'1px solid '+border,borderRadius:8,color:TXT,padding:'8px 10px',fontSize:12.5,cursor:'pointer',outline:'none',marginBottom:12}}>
            {CFG.modeles.map(m=><option key={m.id} value={m.id}>{m.label} - {m.tag}</option>)}
          </select>
          <img src={CFG.badge} alt="badge" style={{width:'100%',objectFit:'contain',display:'block',borderRadius:6}} onError={e=>e.target.style.display='none'}/>
          <div style={{fontSize:9.5,color:'rgba(0,0,0,.22)',textAlign:'center',marginTop:10,letterSpacing:.4}}>{CFG.copyright}</div>
        </div>
      </div>

      {/* ══ MAIN ══ */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0,minHeight:0}}>

        {/* Topbar */}
        <div style={{flexShrink:0,padding:'11px 16px',background:glass,backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderBottom:'1px solid '+border,display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>setSb(v=>!v)} style={{background:'none',border:'none',color:MUTED,cursor:'pointer',fontSize:20,lineHeight:1,display:'flex',alignItems:'center'}}>&#9776;</button>
          {mob&&<span className="cynoxa-name" style={{fontSize:16}}>CYNOXA</span>}
          <div style={{flex:1,overflow:'hidden'}}>
            <div style={{fontSize:13.5,fontWeight:600,color:TXT,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{active?active.title:CFG.nomTexte}</div>
            {!mob&&<div style={{fontSize:10,color:MUTED,marginTop:1}}>{(CFG.modeles.find(m=>m.id===model)||{}).label} - {active?active.messages.length:0} messages</div>}
          </div>
          {busy&&<div style={{display:'flex',gap:5,alignItems:'center'}}>
            {[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:'50%',background:G,display:'inline-block',animation:'pulse 1.2s ease-in-out infinite',animationDelay:i*.2+'s'}}/>)}
          </div>}
        </div>

        {/* Zone messages */}
        <div style={{flex:1,overflowY:'auto',overflowX:'hidden',minHeight:0}}>
          {(!active||active.messages.length===0)?(

            /* ══ ECRAN ACCUEIL ══ */
            <div style={{
              display:'flex',flexDirection:'column',alignItems:'center',
              padding:mob?'16px 14px 16px':'20px 32px 16px',
              minHeight:'100%',
              animation:'fadein .55s ease'
            }}>
              {/* BANNIERE — en haut, taille reduite */}
              <div style={{
                maxWidth:mob?'88%':'500px',
                width:'100%',
                borderRadius:12,overflow:'hidden',
                boxShadow:'0 3px 18px rgba(0,0,0,.10)',
                marginBottom:mob?'auto':0,
                flexShrink:0
              }}>
                <img src={CFG.banner} alt="CYNOXA"
                  style={{width:'100%',display:'block',borderRadius:12}}
                  onError={e=>e.target.style.display='none'}/>
              </div>

              {/* Spacer flexible — pousse les suggestions vers le bas */}
              <div style={{flex:1,minHeight:mob?16:24}}/>

              {/* Sous-titre */}
              <p style={{fontSize:mob?12.5:13.5,color:MUTED,marginBottom:12,fontWeight:500,textAlign:'center'}}>
                Comment puis-je t'aider aujourd'hui ?
              </p>

              {/* Suggestions */}
              <div style={{display:'flex',flexWrap:'wrap',gap:mob?8:10,justifyContent:'center',width:'100%',maxWidth:560,paddingBottom:8}}>
                {CFG.suggestions.map(s=>(
                  <button key={s} onClick={()=>send(s)}
                    style={{background:'rgba(255,255,255,.75)',backdropFilter:'blur(10px)',border:'1px solid rgba(0,0,0,.10)',borderRadius:22,padding:mob?'8px 14px':'9px 18px',color:MUTED,fontSize:mob?12:12.5,cursor:'pointer',transition:'all .2s',boxShadow:'0 1px 8px rgba(0,0,0,.06)'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=G;e.currentTarget.style.color=G;e.currentTarget.style.background='rgba(255,255,255,.95)';}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(0,0,0,.10)';e.currentTarget.style.color=MUTED;e.currentTarget.style.background='rgba(255,255,255,.75)';}}>
                    {s}
                  </button>
                ))}
              </div>
            </div>

          ):(
            /* ══ MESSAGES ══ */
            <div style={{maxWidth:820,margin:'0 auto',padding:mob?'16px 12px 0':'24px 24px 0'}}>
              {active.messages.map((msg,idx)=>(
                <div key={idx} style={{marginBottom:18,display:'flex',flexDirection:'column',alignItems:msg.role==='user'?'flex-end':'flex-start',animation:'fadein .3s ease'}}>
                  <div style={{fontSize:11,color:MUTED,marginBottom:4,display:'flex',alignItems:'center',gap:6}}>
                    {msg.role==='assistant'
                      ?<><img src={CFG.logo} style={{width:16,height:16,objectFit:'contain',borderRadius:3}} onError={e=>e.target.style.display='none'}/><span style={{fontWeight:600,color:'#2a5a2a'}}>{CFG.nomTexte}</span></>
                      :<><span style={{width:8,height:8,borderRadius:'50%',background:'linear-gradient(135deg,'+R+','+G+')',display:'inline-block'}}/><span>Vous</span></>
                    }
                  </div>
                  <div style={{maxWidth:mob?'93%':'80%',padding:'12px 16px',borderRadius:msg.role==='user'?'18px 18px 4px 18px':'4px 18px 18px 18px',background:msg.role==='user'?'rgba(0,160,60,.1)':'rgba(255,255,255,.88)',backdropFilter:'blur(14px)',WebkitBackdropFilter:'blur(14px)',border:'1px solid '+(msg.role==='user'?'rgba(0,160,60,.22)':'rgba(0,0,0,.08)'),boxShadow:'0 2px 12px rgba(0,0,0,.06)',position:'relative'}}>
                    {msg.role==='user'?<p style={{margin:0,lineHeight:1.75,fontSize:14.5,color:TXT}}>{msg.content}</p>:<MD text={msg.content}/>}
                    {msg.streaming&&<span style={{display:'inline-block',width:2,height:'1em',background:G,marginLeft:3,verticalAlign:'middle',animation:'blink 1s step-end infinite'}}/>}
                    {!msg.streaming&&msg.content&&(
                      <button onClick={()=>copy(msg.content,idx)}
                        style={{position:'absolute',top:6,right:6,background:'none',border:'none',color:copied===idx?'#22c55e':'rgba(0,0,0,.18)',cursor:'pointer',fontSize:13,padding:'2px 5px',borderRadius:4,transition:'color .15s'}}
                        onMouseEnter={e=>{if(copied!==idx)e.currentTarget.style.color=MUTED;}}
                        onMouseLeave={e=>{if(copied!==idx)e.currentTarget.style.color='rgba(0,0,0,.18)';}}>
                        {copied===idx?'OK':'copy'}
                      </button>
                    )}
                  </div>
                </div>
              ))}
              <div ref={endRef} style={{height:8}}/>
            </div>
          )}
        </div>

        {/* ══ BARRE SAISIE ══ */}
        <div style={{flexShrink:0,background:glass,backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderTop:'1px solid '+border,padding:mob?'8px 12px 12px':'10px 24px 14px',boxShadow:'0 -1px 16px rgba(0,0,0,.05)'}}>
          <div style={{maxWidth:820,margin:'0 auto',display:'flex',gap:8,alignItems:'flex-end',background:'rgba(255,255,255,.92)',border:'1.5px solid rgba(0,0,0,.08)',borderRadius:18,padding:'8px 8px 8px 16px',boxShadow:'0 3px 20px rgba(0,80,30,.07)',transition:'border-color .2s'}}
            onFocusCapture={e=>e.currentTarget.style.borderColor=G}
            onBlurCapture={e=>e.currentTarget.style.borderColor='rgba(0,0,0,.08)'}>
            <textarea ref={taRef} value={input} onChange={resize} onKeyDown={onKey} rows={1}
              placeholder={'Pose ta question a '+CFG.nomTexte+'...'}
              style={{flex:1,background:'none',border:'none',outline:'none',color:TXT,fontSize:mob?14:14.5,resize:'none',maxHeight:120,lineHeight:1.6,padding:'4px 0',fontFamily:'inherit',caretColor:G}}/>
            <button onClick={()=>send()} disabled={!input.trim()||busy}
              style={{width:42,height:42,borderRadius:12,background:input.trim()&&!busy?G:'rgba(0,0,0,.06)',border:'none',cursor:input.trim()&&!busy?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .22s',boxShadow:input.trim()&&!busy?'0 3px 14px rgba(0,180,60,.35)':'none'}}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill={input.trim()&&!busy?'#fff':'rgba(0,0,0,.25)'}><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
          <div style={{textAlign:'center',fontSize:10,color:'rgba(0,0,0,.2)',marginTop:5}}>Entree pour envoyer - Maj+Entree saut de ligne</div>
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
